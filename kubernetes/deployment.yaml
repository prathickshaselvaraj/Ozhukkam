---
# ─── Server Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozhukkam-server
  namespace: default
  labels:
    app: ozhukkam-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ozhukkam-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ozhukkam-server
    spec:
      containers:
        - name: server
          image: prathicksha15/ozhukkam-server:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ozhukkam-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: ozhukkam-postgres-pvc

---
# ─── Client Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozhukkam-client
  namespace: default
  labels:
    app: ozhukkam-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ozhukkam-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ozhukkam-client
    spec:
      containers:
        - name: client
          image: prathicksha15/ozhukkam-client:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
