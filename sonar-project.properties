sonar.projectKey=ozhukkam
sonar.projectName=Ozhukkam
sonar.projectVersion=1.0

# Source paths
sonar.sources=server/src,client/src
sonar.tests=server/tests,client/src

# Language
sonar.language=js
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/build/**,**/dist/**

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate — must be set to Strict_Production_Gate in SonarQube UI
sonar.qualitygate.wait=true
