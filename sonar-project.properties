sonar.projectKey=ozhukkam
sonar.projectName=Ozhukkam
sonar.projectVersion=1.0

# Sources
sonar.sources=server/src,client/src

# Remove tests reference (since we don't have a separate tests folder)
sonar.tests=

# Exclude node_modules
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**

# JavaScript/TypeScript
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# Encoding
sonar.sourceEncoding=UTF-8
